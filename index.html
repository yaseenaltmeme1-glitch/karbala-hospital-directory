<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#004b49">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title id="pageTitle">دليل مستشفى الإمام الحسن المجتبى (ع)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root { --primary: #004b49; --secondary: #007c77; --bg: #f8f9fa; --card: #ffffff; --text: #2c3e50; --muted: #7f8c8d; --gold: #d4af37; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; padding-bottom: 70px; transition: 0.3s; }
        
        /* Containers */
        .container { max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); }
        .header-container { position: sticky; top: 0; background: white; z-index: 1000; padding: 15px 20px 0; border-bottom: 3px solid var(--primary); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* Auth Styles */
        #authSection input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Tabs */
        .tabs { display: flex; justify-content: space-around; margin-top: 10px; border-top: 1px solid #eee; }
        .tab-btn { background: none; border: none; font-family: inherit; font-size: 0.85rem; font-weight: bold; color: var(--muted); padding: 12px 5px; cursor: pointer; flex: 1; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        /* App Components */
        .search-wrapper { position: relative; margin: 15px 0; }
        .search-wrapper input { width: 100%; padding: 14px 45px 14px 15px; border: 2px solid #e0e6ed; border-radius: 12px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .search-icon { position: absolute; top: 50%; right: 15px; transform: translateY(-50%); color: var(--muted); }
        
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--primary); box-shadow: 0 3px 10px rgba(0,0,0,0.02); }
        .number-box { background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; direction: ltr; }
        
        .admin-panel { border: 2px dashed var(--gold); padding: 15px; border-radius: 12px; margin-top: 20px; background: #fffcf0; }
        .log-item { font-size: 0.8rem; padding: 5px; border-bottom: 1px solid #eee; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .developer-footer { position: fixed; bottom: 0; width: 100%; background: white; text-align: center; padding: 10px 0; font-size: 0.8rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="appContainer">
        <div id="authSection" class="container" style="margin-top: 100px;">
            <h2 id="authTitle" style="text-align:center;">تسجيل الدخول</h2>
            <div id="registerOnly" style="display:none;">
                <input type="text" id="regName" placeholder="الاسم الثلاثي">
                <input type="text" id="regDept" placeholder="القسم / محل العمل">
                <input type="text" id="regTitle" placeholder="العنوان الوظيفي">
            </div>
            <input type="text" id="loginUser" placeholder="اسم المستخدم">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="btn-main" onclick="handleAuth()" id="mainAuthBtn">دخول</button>
            <p style="text-align:center; color:var(--muted); cursor:pointer; margin-top:15px;" onclick="toggleAuthMode()" id="toggleTxt">ليس لديك حساب؟ سجل الآن</p>
        </div>

        <div id="pendingSection" class="container" style="display:none; text-align:center; margin-top:100px;">
            <i class="fas fa-clock" style="font-size:4rem; color:var(--gold);"></i>
            <h2>طلبك قيد المراجعة</h2>
            <p>أهلاً بك. تم إرسال طلبك للإدارة، يرجى انتظار التفعيل.</p>
            <button class="btn-main" onclick="location.reload()">تحديث الحالة</button>
        </div>

        <div id="mainApp" style="display:none;">
            <div class="header-container">
                <div class="top-bar">
                    <div class="hospital-title" style="display:flex; align-items:center; gap:10px;">
                        <div class="hospital-logo" style="width:35px; height:35px; background:var(--primary); color:white; border-radius:50%; display:flex; justify-content:center; align-items:center;"><i class="fas fa-hospital"></i></div>
                        <h1 style="font-size:1rem; margin:0;">مستشفى الإمام الحسن (ع)</h1>
                    </div>
                    <button class="lang-btn" onclick="logout()" style="border-color:#e74c3c; color:#e74c3c;"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('phones', this)"><i class="fas fa-phone"></i> الهواتف</button>
                    <button class="tab-btn" onclick="showTab('quick', this)"><i class="fas fa-bolt"></i> فحص سريع</button>
                    <button class="tab-btn" onclick="showTab('secure', this)"><i class="fas fa-shield-alt"></i> أمني</button>
                    <button id="adminTabBtn" class="tab-btn" onclick="showTab('admin', this)" style="display:none; color:var(--gold);"><i class="fas fa-user-crown"></i> الإدارة</button>
                </div>
            </div>

            <div class="main-content">
                <div id="phones" class="tab-content active">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="phoneSearch" placeholder="بحث عن قسم أو رقم..." onkeyup="searchPhones()">
                    </div>
                    <div id="phoneResults"></div>
                </div>

                <div id="quick" class="tab-content">
                    <div class="search-wrapper">
                        <input type="text" id="quickInput" placeholder="أدخل رقم اللوحة...">
                    </div>
                    <button class="btn-main" style="background:var(--secondary);" onclick="checkCar('quick')">فحص سريع</button>
                    <div id="quickRes"></div>
                </div>

                <div id="secure" class="tab-content">
                    <div class="search-wrapper">
                        <input type="text" id="secureInput" placeholder="أدخل رقم اللوحة للتفاصيل...">
                    </div>
                    <button class="btn-main" onclick="checkCar('secure')">بحث مفصل</button>
                    <div id="secureRes"></div>
                </div>

                <div id="admin" class="tab-content">
                    <div class="admin-panel">
                        <h3><i class="fas fa-users-cog"></i> طلبات الانضمام</h3>
                        <div id="pendingUsers"></div>
                    </div>
                    <div class="admin-panel" style="border-color:var(--primary);">
                        <h3><i class="fas fa-database"></i> إدارة البيانات</h3>
                        <button class="btn-main" onclick="importFromJs()">رفع بيانات cars.js للـ Database</button>
                        <p style="font-size:0.7rem; color:red;">* اضغط الزر أعلاه مرة واحدة فقط عند التشغيل الأول.</p>
                    </div>
                    <div class="admin-panel">
                        <h3><i class="fas fa-history"></i> سجل النشاط (آخر عمليات البحث)</h3>
                        <div id="activityLogs"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="developer-footer">
        <span>Developed by Yaseen ALtmeme &copy; 2026</span>
    </div>

    <script src="cars.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1Uh51j1JLdXWtunD2tj5i8ZLjHuTMxeQ",
            authDomain: "karbala-hospital.firebaseapp.com",
            projectId: "karbala-hospital",
            storageBucket: "karbala-hospital.firebasestorage.app",
            messagingSenderId: "1096505040807",
            appId: "1:1096505040807:web:0cd4bb00f2a949b639a082"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUserData = null;
        let isRegister = false;

        // --- Auth Functions ---
        window.toggleAuthMode = () => {
            isRegister = !isRegister;
            document.getElementById('registerOnly').style.display = isRegister ? 'block' : 'none';
            document.getElementById('authTitle').innerText = isRegister ? 'إنشاء حساب موظف' : 'تسجيل الدخول';
            document.getElementById('mainAuthBtn').innerText = isRegister ? 'إرسال طلب تفعيل' : 'دخول';
        };

        window.handleAuth = async () => {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if(!user || !pass) return alert("امسح الحقول واكتب المعلومات");

            const email = user.includes('@') ? user : user + "@hosp.com";

            if(isRegister) {
                const name = document.getElementById('regName').value;
                const dept = document.getElementById('regDept').value;
                if(!name || !dept) return alert("اكمل البيانات المطلوبة");
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), {
                        name, dept, username: user, role: 'user', status: 'pending'
                    });
                    alert("تم إرسال الطلب بنجاح");
                } catch(e) { alert("خطأ: " + e.message); }
            } else {
                try { await signInWithEmailAndPassword(auth, email, pass); }
                catch(e) { alert("اليوزر أو الباسورد خطأ"); }
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                currentUserData = snap.val();
                if(!currentUserData) return;

                if(currentUserData.status === 'pending') {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('pendingSection').style.display = 'block';
                } else {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    if(currentUserData.role === 'admin') {
                        document.getElementById('adminTabBtn').style.display = 'block';
                        loadAdminData();
                    }
                    renderPhoneList();
                }
            }
        });

        // --- App Logic ---
        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        };

        // فحص السيارات من قاعدة البيانات
        window.checkCar = async (mode) => {
            const inputId = mode === 'quick' ? 'quickInput' : 'secureInput';
            const resId = mode === 'quick' ? 'quickRes' : 'secureRes';
            const plate = document.getElementById(inputId).value.trim();
            if(!plate) return;

            const snap = await get(ref(db, 'cars'));
            const cars = snap.val();
            let found = null;
            
            // بحث عن الرقم في الكائنات
            for(let key in cars) {
                if(cars[key].plate == plate) { found = cars[key]; break; }
            }

            // تسجيل المراقبة
            push(ref(db, 'logs'), {
                user: currentUserData.name,
                plate: plate,
                time: new Date().toLocaleString('ar-IQ'),
                type: mode
            });

            const resDiv = document.getElementById(resId);
            if(found) {
                if(mode === 'quick') {
                    resDiv.innerHTML = `<div style="background:#e8f8f5; color:#27ae60; padding:15px; border-radius:10px; margin-top:10px; text-align:center;"><b>مسموح بالدخول ✅</b></div>`;
                } else {
                    resDiv.innerHTML = `
                        <div class="car-card">
                            <div class="car-detail"><span>الاسم:</span> <b>${found.name}</b></div>
                            <div class="car-detail"><span>القسم:</span> <b>${found.dept}</b></div>
                            <div class="car-detail"><span>السيارة:</span> <b>${found.type} - ${found.color}</b></div>
                            <div class="car-detail"><span>الباج:</span> <b>${found.badge}</b></div>
                        </div>`;
                }
            } else {
                resDiv.innerHTML = `<div style="background:#fdedec; color:#e74c3c; padding:15px; border-radius:10px; margin-top:10px; text-align:center;"><b>غير موجود بالسجلات ❌</b></div>`;
            }
        };

        // رفع البيانات من ملف cars.js (يُستخدم مرة واحدة)
        window.importFromJs = async () => {
            if(confirm("هل تريد رفع كل بيانات ملف cars.js إلى السيرفر؟")){
                const carsRef = ref(db, 'cars');
                for(let car of carDb) {
                    await push(carsRef, car);
                }
                alert("تم رفع " + carDb.length + " سيارة بنجاح!");
            }
        };

        // عرض طلبات المستخدمين للآدمن
        function loadAdminData() {
            onValue(ref(db, 'users'), (snap) => {
                const users = snap.val();
                let html = '';
                for(let id in users) {
                    if(users[id].status === 'pending') {
                        html += `<div class="card">
                            <div><b>${users[id].name}</b><br><small>${users[id].dept}</small></div>
                            <button onclick="approveUser('${id}')" style="width:auto; padding:5px 15px; background:#27ae60;">تفعيل</button>
                        </div>`;
                    }
                }
                document.getElementById('pendingUsers').innerHTML = html || 'لا توجد طلبات جديدة';
            });

            onValue(ref(db, 'logs'), (snap) => {
                const logs = snap.val();
                let html = '';
                const entries = Object.values(logs || {}).reverse().slice(0, 10);
                entries.forEach(l => {
                    html += `<div class="log-item">👤 ${l.user} بحث عن [${l.plate}] - <small>${l.time}</small></div>`;
                });
                document.getElementById('activityLogs').innerHTML = html;
            });
        }

        window.approveUser = (id) => update(ref(db, 'users/' + id), { status: 'approved' });

        // --- Phone Directory logic (from your original code) ---
        function renderPhoneList() {
            const list = document.getElementById('phoneResults');
            // 'db' is your internal phone list
            list.innerHTML = window.phoneDbList.map(item => `
                <div class="card">
                    <div><b>${item.ar}</b></div>
                    <div class="number-box" onclick="navigator.clipboard.writeText('${item.ext}'); alert('تم النسخ')">${item.ext}</div>
                </div>
            `).join('');
        }
        window.phoneDbList = [
            {ar: "استعلامات الادارة", ext: "1025"},
            {ar: "الاستعلامات الرئيسية", ext: "0319"},
            {ar: "الاشعة", ext: "0196"},
            // ... تكدر تضيف البقية هنا بنفس التنسيق
        ];

    </script>
</body>
</html>
